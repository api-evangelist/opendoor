aid: opendoor
name: Opendoor
description: >-
  Opendoor is an iBuyer that lets U.S. homeowners request a near-instant cash
  offer on their home, sell directly to Opendoor, list with Opendoor through
  its agent network, or browse off-market inventory via Opendoor Exclusives.
  Founded in 2014 and publicly traded on NASDAQ as OPEN, the company runs
  buying, renovation, listing, and resale at scale and partners with
  third-party agents and brokerages through its Opendoor for Agents program
  and Opendoor Exclusives marketplace. Opendoor does not publish a self-serve
  public developer portal or open REST API; partner and agent integrations are
  arranged directly through Opendoor's business development and partnerships
  teams. This profile documents what is publicly findable on Opendoor's
  partner-facing surfaces.
