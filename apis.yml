apis:
  - aid: opendoor:opendoor-for-agents
    name: Opendoor for Agents
    description: >-
      Opendoor for Agents is the partner program that lets licensed
      real-estate agents submit clients to Opendoor for a cash offer, list
      Opendoor-owned inventory, and earn referral commissions. Integration is
      delivered through Opendoor's agent portal and direct partner onboarding
      with email and MLS ID rather than a public REST API.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.opendoor.com/agents
    baseURL: https://www.opendoor.com
    tags:
      - Agents
      - Partners
      - Real Estate
      - Referrals
    properties:
      - type: Portal
        url: https://www.opendoor.com/agents
      - type: GettingStarted
        url: https://www.opendoor.com/agents
  - aid: opendoor:opendoor-exclusives
    name: Opendoor Exclusives
    description: >-
      Opendoor Exclusives is an off-market home marketplace where Opendoor
      lists inventory it has recently acquired, before those homes hit the
      MLS. Partner integrations for Exclusives (lender, search portal, and
      agent surfaces) are arranged directly with Opendoor business
      development rather than through a self-serve API. The consumer-facing
      site is a search and offer-submission experience.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.opendoor.com/exclusives
    baseURL: https://www.opendoor.com
    tags:
      - Exclusives
      - Inventory
      - Listings
      - Off-Market
      - Real Estate
    properties:
      - type: Portal
        url: https://www.opendoor.com/exclusives
  - aid: opendoor:opendoor-partners
    name: Opendoor Partner Integrations
    description: >-
      Opendoor maintains brand partnerships with home-search portals,
      brokerages, lenders, and home-services providers that surface Opendoor
      cash offers and Exclusives listings inside partner experiences. These
      integrations are bespoke, gated, and provisioned through Opendoor
      business development rather than a public developer portal.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.opendoor.com
    baseURL: https://www.opendoor.com
    tags:
      - Brokerages
      - Lenders
      - Partners
      - Real Estate
    properties:
      - type: Portal
        url: https://www.opendoor.com
